<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#01818C"/>
  <!-- Daisy petals (8, white) -->
  <g fill="white" opacity="0.95" transform="translate(16,16)">
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(0)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(45)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(90)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(135)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(180)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(225)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(270)"/>
    <ellipse rx="2.6" ry="5.5" cy="-8" transform="rotate(315)"/>
  </g>
  <!-- Center: golden with a darker ring for depth -->
  <circle cx="16" cy="16" r="4.8" fill="#e8960a"/>
  <circle cx="16" cy="16" r="3.8" fill="#FFD23F"/>
</svg>
