<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Kraft background -->
  <circle cx="16" cy="16" r="16" fill="#C9A55A"/>
  <!-- 8 daisy petals (cream fill, charcoal stroke) -->
  <g transform="translate(16,16)">
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(0)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(45)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(90)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(135)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(180)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(225)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(270)"/>
    <ellipse rx="2.1" ry="4.8" cy="-7.2" fill="#F5EAD5" stroke="#2A2220" stroke-width="0.5" transform="rotate(315)"/>
  </g>
  <!-- Mustard center with darker ring -->
  <circle cx="16" cy="16" r="4.8" fill="#A87208"/>
  <circle cx="16" cy="16" r="3.8" fill="#C9930A"/>
</svg>
